name: Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android App & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'
          cache: gradle
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Create build-artifacts directory
        run: mkdir -p build-artifacts

      - name: Decode Keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        working-directory: ${{ github.workspace }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo $DEBUG_KEYSTORE_BASE64 | base64 --decode > debug.keystore
          elif [ -f "debug.keystore.base64" ]; then
            cat debug.keystore.base64 | base64 --decode > debug.keystore
          else
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 -keypass android -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Prepare Debug APK Release
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              VERSION="${{ github.ref_name }}"
            else
              VERSION="dev"
            fi
            cp "$APK_PATH" "build-artifacts/Search-${VERSION}-debug.apk"
            echo "Debug APK prepared at build-artifacts/Search-${VERSION}-debug.apk"
          else
            echo "Error: Debug APK not found at $APK_PATH"
            exit 1
          fi

      - name: Build Release APK and AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "Signing secrets found. Building signed Release APK and AAB..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
            export KEYSTORE_PATH="$(pwd)/my-upload-key.jks"
            gradle assembleRelease bundleRelease --stacktrace
          else
            echo "Signing secrets not fully configured. Building unsigned Release APK and AAB."
            gradle assembleRelease bundleRelease --stacktrace
          fi
          
          # Handle output path differences between signed and unsigned builds
          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_AAB="app/build/outputs/bundle/release/app-release.aab"
          
          if [ -f "$SIGNED_APK" ]; then
            RELEASE_APK_PATH="$SIGNED_APK"
          elif [ -f "$UNSIGNED_APK" ]; then
            RELEASE_APK_PATH="$UNSIGNED_APK"
          else
            echo "Warning: Release APK built but not found at expected paths"
          fi
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev"
          fi
          
          if [ -n "$RELEASE_APK_PATH" ]; then
            cp "$RELEASE_APK_PATH" "build-artifacts/Search-${VERSION}-release.apk"
            echo "Release APK prepared at build-artifacts/Search-${VERSION}-release.apk"
          fi
          
          if [ -f "$SIGNED_AAB" ]; then
            cp "$SIGNED_AAB" "build-artifacts/Search-${VERSION}-release.aab"
            echo "Release AAB prepared at build-artifacts/Search-${VERSION}-release.aab"
          else
            echo "Warning: Release AAB not found"
          fi

      - name: Upload APKs as Run Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Search-APKs
          path: build-artifacts/

      - name: Create or Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/*.apk
            build-artifacts/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
